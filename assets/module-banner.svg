<svg id="module-banner" width="100%" height="auto" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" class="block">
  <!-- Background -->
  <rect width="1280" height="640" fill="#020420"/>

  <!-- Ambient Glows -->
  <g style="mix-blend-mode: screen">
    <circle cx="1000" cy="-50" r="500" fill="#00DC82" fill-opacity="0.12" filter="blur(120px)"/>
    <circle cx="200" cy="700" r="500" fill="#00DC82" fill-opacity="0.08" filter="blur(120px)"/>
  </g>

  <!-- Grid Pattern -->
  <defs>
    <pattern id="dot-grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#FFFFFF" fill-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#dot-grid)"/>

  <!-- Central Icon: AI Microchip / Server -->
  <g transform="translate(640, 220)">
    <!-- Outer Hex/Box -->
    <rect x="-70" y="-70" width="140" height="140" rx="28" fill="#00DC82" fill-opacity="0.05" stroke="#00DC82" stroke-width="2" stroke-opacity="0.5"/>

    <!-- Inner Node -->
    <rect x="-35" y="-35" width="70" height="70" rx="16" fill="#020420" stroke="#00DC82" stroke-width="4"/>
    <circle cx="0" cy="0" r="10" fill="#00DC82"/>

    <!-- Connection Traces -->
    <!-- Top -->
    <path d="M-70 -24 L-35 -24 M-70 0 L-35 0 M-70 24 L-35 24" stroke="#00DC82" stroke-width="4" stroke-linecap="round" stroke-opacity="0.8"/>
    <!-- Bottom -->
    <path d="M70 -24 L35 -24 M70 0 L35 0 M70 24 L35 24" stroke="#00DC82" stroke-width="4" stroke-linecap="round" stroke-opacity="0.8"/>
    <!-- Left -->
    <path d="M-24 -70 L-24 -35 M0 -70 L0 -35 M24 -70 L24 -35" stroke="#00DC82" stroke-width="4" stroke-linecap="round" stroke-opacity="0.8"/>
    <!-- Right -->
    <path d="M-24 70 L-24 35 M0 70 L0 35 M24 70 L24 35" stroke="#00DC82" stroke-width="4" stroke-linecap="round" stroke-opacity="0.8"/>
  </g>

  <!-- Typography -->
  <text x="640" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.02em">
    Nuxt <tspan fill="#00DC82">Local Models</tspan>
  </text>

  <text x="640" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94A3B8" text-anchor="middle" letter-spacing="0.01em">
    Run local AI models and inference directly inside your Nuxt server
  </text>

  <!-- Module Badge -->
  <g transform="translate(640, 560)">
    <rect x="-85" y="-18" width="170" height="36" rx="18" fill="#1E293B" fill-opacity="0.8" stroke="#334155" stroke-width="1"/>
    <circle cx="-60" cy="0" r="4" fill="#00DC82"/>
    <text x="-44" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#E2E8F0" letter-spacing="0.05em">NUXT MODULE</text>
  </g>

  <!-- Decorative corner accents -->
  <path d="M 40 40 L 80 40 M 40 40 L 40 80" stroke="#334155" stroke-width="2" fill="none"/>
  <path d="M 1240 40 L 1200 40 M 1240 40 L 1240 80" stroke="#334155" stroke-width="2" fill="none"/>
  <path d="M 40 600 L 80 600 M 40 600 L 40 560" stroke="#334155" stroke-width="2" fill="none"/>
  <path d="M 1240 600 L 1200 600 M 1240 600 L 1240 560" stroke="#334155" stroke-width="2" fill="none"/>
</svg>
